<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン - ひなたぼっこぷらんつ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0B2B1E 0%, #1B4332 100%);
      color: #F5F7F2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .offline-card {
      max-width: 400px;
    }
    .offline-icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.7;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p {
      color: rgba(245, 247, 242, 0.7);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #52B788;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #40916C; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 4C18.5 2.5 15.5 1 12 1C8.5 1 5.5 2.5 4 4"/>
        <path d="M17 7C15.8 5.8 14 5 12 5C10 5 8.2 5.8 7 7"/>
        <path d="M14 10C13.5 9.5 12.8 9 12 9C11.2 9 10.5 9.5 10 10"/>
        <circle cx="12" cy="13" r="1" fill="currentColor"/>
        <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>
    <h1>オフラインです</h1>
    <p>インターネット接続が見つかりません。<br>接続を確認して、もう一度お試しください。</p>
    <button class="retry-btn" onclick="window.location.reload()">再読み込み</button>
  </div>
</body>
</html>
